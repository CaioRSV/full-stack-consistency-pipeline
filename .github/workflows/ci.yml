name: CI

on:
  push:
    branches: [ main, master, "merge/**", "feature/**" ]
  pull_request:
    branches: [ main, master, "merge/**", "feature/**" ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Approve Builds
        run: pnpm approve-builds || true

      - name: Run ESLint
        run: pnpm --filter @pipeline/web lint

      - name: Setup Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          nohup ollama serve > ollama.log 2>&1 &
          echo "Waiting for Ollama to start..."
          until curl -s http://127.0.0.1:11434 > /dev/null; do
            sleep 2
          done
          echo "Ollama is running. Pulling qwen2.5-coder:3b..."
          ollama pull qwen2.5-coder:3b

      - name: 🔄 1. GraphQL Code Generator Validation
        run: npx graphql-codegen --config codegen.ts

      - name: 🔍 2. TypeScript Compilation Check
        run: pnpm -r typecheck

      - name: 🤖 3. AI-Assisted Contract Validation
        run: |
          nohup ollama serve > ollama.log 2>&1 &
          echo "Waiting for Ollama to start..."
          until curl -s http://127.0.0.1:11434 > /dev/null; do
            sleep 2
          done
          npx ts-node scripts/ai/semantic-drift-detection.ts
